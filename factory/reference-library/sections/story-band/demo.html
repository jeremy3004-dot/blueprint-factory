<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>story-band — standalone demo</title>
    <link rel="stylesheet" href="story-band.css" />
    <style>
      /* Demo page chrome only — not part of the pattern. */
      body {
        margin: 0;
        background: #fffdf6;
        color: #151412;
        font-family: "Helvetica Neue", Arial, sans-serif;
      }
    </style>
  </head>
  <body>
    <section class="sb-band" aria-label="Editorial story">
      <img src="https://picsum.photos/1200/900?random=31" alt="" />
      <div class="sb-copy">
        <p class="sb-eyebrow">Store to screen</p>
        <h2>What makes an honest neighborhood grocery app?</h2>
        <p>
          It should know where you shop, make the offer visible at the right
          moment, and keep the physical store at the center of the promise.
        </p>
      </div>
    </section>
  </body>
</html>
