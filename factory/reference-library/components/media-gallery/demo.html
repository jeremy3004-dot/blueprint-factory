<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>media-gallery — standalone demo</title>
    <link rel="stylesheet" href="media-gallery.css" />
    <style>
      /* Demo page chrome only — not part of the pattern. */
      body {
        margin: 0;
        padding: 56px 0 72px;
        background: #fbf9f5;
        color: #1f211e;
        font-family: "Helvetica Neue", Arial, sans-serif;
        overflow-x: hidden;
      }
      .demo-intro {
        max-width: 560px;
        margin: 0 auto 40px;
        padding: 0 24px;
        text-align: center;
      }
      .demo-intro p {
        margin: 0 0 6px;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.16em;
        color: #555852;
      }
      .demo-intro h2 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-weight: 400;
        font-size: clamp(28px, 4vw, 46px);
      }
    </style>
  </head>
  <body>
    <div class="demo-intro">
      <p>Experiences</p>
      <h2>Journeys of discovery</h2>
    </div>

    <section class="mg-root" data-media-gallery aria-label="Journeys of discovery">
      <script type="application/json">
        [
          { "title": "Savour", "label": "Dining", "image": "https://picsum.photos/1200/900?random=11", "copy": "Celebrated chefs, immersive culinary journeys and a spirit of innovation define our dining worlds." },
          { "title": "Reconnect", "label": "Wellness", "image": "https://picsum.photos/1200/900?random=12", "copy": "Rituals rooted in place bring stillness, heat, texture and expert care into the day." },
          { "title": "Gather", "label": "Events", "image": "https://picsum.photos/1200/900?random=13", "copy": "Private celebrations and rare moments unfold with the ease of a resort made around you." }
        ]
      </script>
    </section>

    <script src="media-gallery.js"></script>
  </body>
</html>
