<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>accordion — demo</title>
  <link rel="stylesheet" href="accordion.css" />
  <style>
    /* Demo-only scaffolding (not part of the pattern). */
    body { margin: 0; padding: 48px; font-family: Arial, Helvetica, sans-serif;
      background: #f2f2f2; color: #1f211e; }
    h1 { font-size: 15px; letter-spacing: 0.24em; text-transform: uppercase;
      font-weight: 700; margin: 0 0 6px; }
    p.note { color: #6f716d; font-size: 13px; margin: 0 0 36px; max-width: 46ch; }
  </style>
</head>
<body>
  <h1>accordion</h1>
  <p class="note">Single-open: opening one section closes the others. The +/-
    glyph and screen-reader state stay in sync via aria-expanded.</p>

  <div class="ac-accordion" data-accordion>
    <div class="ac-item">
      <button class="ac-trigger" aria-expanded="true" aria-controls="ac-p1">About</button>
      <div class="ac-panel" id="ac-p1" role="region" aria-label="About">
        <a href="#">Our Story</a>
        <a href="#">Contact Us</a>
        <a href="#">Newsletter Sign Up</a>
      </div>
    </div>

    <div class="ac-item">
      <button class="ac-trigger" aria-expanded="false" aria-controls="ac-p2">Discover</button>
      <div class="ac-panel" id="ac-p2" role="region" aria-label="Discover" hidden>
        <a href="#">Destinations</a>
        <a href="#">Awards</a>
        <a href="#">Media Centre</a>
        <a href="#">Careers</a>
      </div>
    </div>

    <div class="ac-item">
      <button class="ac-trigger" aria-expanded="false" aria-controls="ac-p3">Follow Us</button>
      <div class="ac-panel" id="ac-p3" role="region" aria-label="Follow Us" hidden>
        <a href="#">Instagram</a>
        <a href="#">TikTok</a>
        <a href="#">YouTube</a>
        <a href="#">LinkedIn</a>
      </div>
    </div>
  </div>

  <script src="accordion.js"></script>
</body>
</html>
